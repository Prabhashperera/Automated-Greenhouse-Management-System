server:
  port: 8080 # The standard port for an API Gateway

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Route for the Zone Service we are about to build
        - id: zone-service
          uri: lb://ZONE-SERVICE # Looks up 'ZONE-SERVICE' in Eureka
          predicates:
            - Path=/api/zones/**

        # Route for the Sensor Service
        - id: sensor-service
          uri: lb://SENSOR-SERVICE
          predicates:
            - Path=/api/sensors/**

        # Route for the Automation Service
        - id: automation-service
          uri: lb://AUTOMATION-SERVICE
          predicates:
            - Path=/api/automation/**

        # Route for the Crop Service
        - id: crop-service
          uri: lb://CROP-SERVICE
          predicates:
            - Path=/api/crops/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/ # Points to your Eureka Server